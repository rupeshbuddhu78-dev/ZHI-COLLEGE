<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHI College | Centralized Admin Portal</title>
    <style>
        /* CSS Same rakha hai */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1562774053-701939374585?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed; height: 100vh; display: flex; justify-content: center; align-items: center; color: #ffffff; }
        .glass-panel { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 50px 40px; width: 100%; max-width: 450px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); text-align: center; }
        .logo-area img { width: 85px; background: #ffffff; border-radius: 50%; padding: 5px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .logo-area h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; color: #ffffff; margin-bottom: 5px; }
        .logo-area p { font-size: 12px; color: #94a3b8; letter-spacing: 3px; margin-bottom: 35px; text-transform: uppercase; }
        .input-group { margin-bottom: 22px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .input-group input, .input-group select { width: 100%; padding: 14px 15px; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; color: white; font-size: 15px; outline: none; transition: all 0.3s ease; }
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .input-group input:focus, .input-group select:focus { background: rgba(255, 255, 255, 0.15); border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .input-group select option { background-color: #0f172a; color: white; padding: 10px; }
        .login-btn { width: 100%; padding: 16px; margin-top: 15px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
        .login-btn:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 15px 25px rgba(37, 99, 235, 0.4); }
        .footer { margin-top: 30px; font-size: 13px; }
        .footer a { color: #94a3b8; text-decoration: none; margin: 0 10px; transition: color 0.3s; }
        .footer a:hover { color: #ffffff; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="logo-area">
            <img src="zhi_logo.png" alt="ZHI Logo">
            <h1>ZAKIR HUSAIN INSTITUTE</h1>
            <p>Admin & Faculty Portal</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>System Role</label>
                <select id="userRole">
                    <option value="director">Director / Super Admin</option>
                    <option value="accounts">Accounts & Office Staff</option>
                    <option value="faculty">Faculty Member (Teacher)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Official Email ID</label>
                <input type="email" id="email" placeholder="admin@zhi.edu.in" required>
            </div>

            <div class="input-group">
                <label>Secure Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Authenticate</button>
        </form>

        <div class="footer">
            <a href="#">Forgot Password?</a> | <a href="#">IT Support</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();

            // Loading effect on Button
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = "Authenticating...";
            btn.disabled = true;

            const loginData = {
                role: document.getElementById('userRole').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });

                const result = await response.json();

                if (response.ok) {
                    // Local Storage me save kar rahe hain taaki dashboard pe user ka naam dikha sakein
                    localStorage.setItem('userRole', loginData.role);
                    if(result.staffName) localStorage.setItem('userName', result.staffName);
                    if(result.staffId) localStorage.setItem('staffId', result.staffId);
                    
                    // 🔴 YAHAN FIX KIYA HAI: Exact Routing Logic 🔴
                    if (loginData.role === 'director') {
                        // Director jayega Admin Dashboard par
                        window.location.href = 'admin_dashboard.html'; 
                    } else if (loginData.role === 'accounts') {
                        // Accounts & Management Staff jayega Staff Dashboard par
                        window.location.href = 'staff_dashboard.html'; 
                    } else if (loginData.role === 'faculty') {
                        // Teachers jayenge apni Teacher profile/dashboard par
                        window.location.href = 'teacher.html';
                    }
                } else {
                    alert("❌ Access Denied: " + result.message);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("⚠️ Server down hai bhai! Backend check karo.");
            }

            // Restore button if error occurs (redirect hone pe ye run nahi hoga)
            btn.innerHTML = "Authenticate";
            btn.disabled = false;
        };
    </script>
</body>
</html>
