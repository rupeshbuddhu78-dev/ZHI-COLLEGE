<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHI College | Centralized Admin Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1562774053-701939374585?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #ffffff; 
            padding: 20px; 
        }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 20px; 
            padding: 40px 30px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); 
            text-align: center; 
        }

        .logo-area img { width: 80px; background: #ffffff; border-radius: 50%; padding: 5px; margin-bottom: 15px; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .logo-area h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; color: #ffffff; margin-bottom: 5px; }
        .logo-area p { font-size: 11px; color: #94a3b8; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .input-group input, .input-group select { 
            width: 100%; 
            padding: 14px 15px; 
            background: rgba(255, 255, 255, 0.06); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 10px; 
            color: white; 
            font-size: 14px; 
            outline: none; 
            transition: all 0.3s ease; 
        }
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .input-group input:focus, .input-group select:focus { background: rgba(255, 255, 255, 0.15); border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .input-group select option { background-color: #0f172a; color: white; padding: 10px; }
        
        .login-btn { width: 100%; padding: 15px; margin-top: 10px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
        .login-btn:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 15px 25px rgba(37, 99, 235, 0.4); }
        .login-btn:disabled { background: #64748b; cursor: not-allowed; transform: none; box-shadow: none; }

        .footer { margin-top: 25px; font-size: 12px; }
        .footer a { color: #94a3b8; text-decoration: none; margin: 0 10px; transition: color 0.3s; cursor: pointer;}
        .footer a:hover { color: #ffffff; }

        /* ---------------- MODAL / POPUP CSS ---------------- */
        .modal-overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(5px);
            z-index: 2000; 
            justify-content: center; 
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            position: relative;
            padding: 30px;
            max-width: 400px;
            animation: slideUp 0.4s ease forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 24px;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.3s;
        }
        .close-btn:hover { color: #fff; }

        @media (max-width: 480px) {
            .glass-panel { padding: 30px 20px; }
            .logo-area h1 { font-size: 20px; }
            .input-group input, .input-group select { padding: 12px; font-size: 13px;}
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="logo-area">
            <img src="zhi_logo.png" alt="ZHI Logo" onerror="this.style.display='none'">
            <h1>ZAKIR HUSAIN INSTITUTE</h1>
            <p>Admin & Faculty Portal</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>System Role</label>
                <select id="userRole" required>
                    <option value="" disabled selected>Select your role...</option>
                    <option value="director">Director (Super Admin)</option>
                    <option value="accountant">Accountant</option>
                    <option value="hod">Academic HOD</option>
                    <option value="staff">Staff</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <div class="input-group">
                <label>Official Email ID</label>
                <input type="email" id="email" placeholder="email@zhi.edu.in" required>
            </div>

            <div class="input-group">
                <label>Secure Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Authenticate</button>
        </form>

        <div class="footer">
            <a onclick="openForgotModal()">Forgot Password?</a> | <a href="#">IT Support</a>
        </div>
    </div>

    <div id="forgotModal" class="modal-overlay">
        <div class="glass-panel modal-content">
            <span class="close-btn" onclick="closeForgotModal()">&times;</span>
            <div class="logo-area" style="margin-bottom: 20px;">
                <h2 style="font-size: 20px; color: #fff; margin-bottom: 5px;">Reset Password</h2>
                <p id="forgotSubtitle">OTP will be sent to your Email</p>
            </div>

            <form id="otpRequestForm" onsubmit="sendOtp(event)">
                <div class="input-group">
                    <label>Select Role</label>
                    <select id="forgotRole" required>
                        <option value="" disabled selected>Select your role...</option>
                        <option value="director">Director</option>
                        <option value="accountant">Accountant</option>
                        <option value="hod">Academic HOD</option>
                        <option value="staff">Staff</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Registered Email</label>
                    <input type="email" id="forgotEmail" placeholder="email@zhi.edu.in" required>
                </div>
                <button type="submit" class="login-btn" id="btnSendOtp">Send OTP</button>
            </form>

            <form id="passwordResetForm" onsubmit="resetPassword(event)" style="display: none;">
                <div class="input-group">
                    <label>Enter 6-Digit OTP</label>
                    <input type="number" id="resetOtp" placeholder="123456" maxlength="6" required>
                </div>
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" id="resetNewPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn" id="btnResetPass" style="background: #10b981;">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. LOGIN LOGIC
        // ==========================================
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            btn.innerHTML = "Authenticating...";
            btn.disabled = true;

            const loginData = {
                role: document.getElementById('userRole').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });

                const result = await response.json();

                if (response.ok) {
                    const userData = {
                        role: loginData.role,
                        name: result.staffName || result.name || result.data?.name || "User",
                        staffId: result.staffId || result.empId || result.data?.empId || "",
                        _id: result.data?._id || result._id || "",
                        email: loginData.email,
                        profilePicUrl: result.data?.profilePicUrl || ""
                    };

                    sessionStorage.setItem('loggedInUser', JSON.stringify(userData));
                    
                    if (loginData.role === 'director') window.location.href = 'admin_dashboard.html'; 
                    else if (loginData.role === 'accountant') window.location.href = 'accountant_dashboard.html'; 
                    else if (loginData.role === 'hod') window.location.href = 'academic_dashboard.html'; 
                    else if (loginData.role === 'staff') window.location.href = 'staff_dashboard.html'; 
                    else if (loginData.role === 'teacher') window.location.href = 'teacher_dashboard.html';
                } else {
                    alert("❌ Access Denied: " + result.message);
                    btn.innerHTML = "Authenticate";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Error:", error);
                alert("⚠️ Server Error! Backend chalu hai ya nahi check karo.");
                btn.innerHTML = "Authenticate";
                btn.disabled = false;
            }
        };

        // ==========================================
        // 2. FORGOT PASSWORD LOGIC
        // ==========================================
        const BASE_URL = 'https://zhi-college-rtya.onrender.com'; // Backend URL
        let savedResetEmail = ""; // Email save karne ke liye

        function openForgotModal() {
            document.getElementById('forgotModal').style.display = 'flex';
            // Reset forms if opened again
            document.getElementById('otpRequestForm').style.display = 'block';
            document.getElementById('passwordResetForm').style.display = 'none';
            document.getElementById('otpRequestForm').reset();
            document.getElementById('passwordResetForm').reset();
            document.getElementById('forgotSubtitle').innerText = "OTP will be sent to your Email";
        }

        function closeForgotModal() {
            document.getElementById('forgotModal').style.display = 'none';
        }

        // STEP 1: Send OTP Request
        async function sendOtp(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSendOtp');
            const email = document.getElementById('forgotEmail').value.trim();
            const role = document.getElementById('forgotRole').value;

            btn.innerHTML = "Sending...";
            btn.disabled = true;

            try {
                const response = await fetch(`${BASE_URL}/api/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, role: role })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alert("✅ OTP Sent Successfully to " + email);
                    savedResetEmail = email; // Save email for next step

                    // Switch UI
                    document.getElementById('otpRequestForm').style.display = 'none';
                    document.getElementById('passwordResetForm').style.display = 'block';
                    document.getElementById('forgotSubtitle').innerText = "Check your email for 6-digit OTP";
                } else {
                    alert("❌ Error: " + (result.message || "Email not found!"));
                }
            } catch (error) {
                console.error("OTP Error:", error);
                alert("⚠️ Server Connection Error!");
            } finally {
                btn.innerHTML = "Send OTP";
                btn.disabled = false;
            }
        }

        // STEP 2: Verify OTP and Save New Password
        async function resetPassword(e) {
            e.preventDefault();
            const btn = document.getElementById('btnResetPass');
            const otp = document.getElementById('resetOtp').value.trim();
            const newPassword = document.getElementById('resetNewPassword').value.trim();

            if (otp.length < 6) {
                alert("Please enter a valid 6-digit OTP");
                return;
            }

            btn.innerHTML = "Updating...";
            btn.disabled = true;

            try {
                const response = await fetch(`${BASE_URL}/api/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: savedResetEmail, 
                        otp: otp, 
                        newPassword: newPassword 
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alert("🎉 Password Changed Successfully! You can login now.");
                    closeForgotModal(); // Popup band kardo
                } else {
                    alert("❌ Error: " + (result.message || "Invalid OTP"));
                }
            } catch (error) {
                console.error("Reset Error:", error);
                alert("⚠️ Server Connection Error!");
            } finally {
                btn.innerHTML = "Update Password";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
