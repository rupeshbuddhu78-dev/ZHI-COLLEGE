<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHI | Mark Student Attendance</title>
    
    <script src="security.js"></script>
    <script>
        // Sirf 'teacher' ko entry milegi
        checkPageAccess(['teacher']); 
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --sidebar-bg: #0f172a; 
            --primary: #14b8a6; 
            --primary-dark: #0f766e;
            --success: #10b981; 
            --warning: #f59e0b; 
            --warning-light: #fef3c7;
            --danger: #ef4444; 
            --bg: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --card-curve: 12px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html, body { width: 100%; overflow-x: hidden; background-color: var(--bg); color: var(--text-dark); display: flex; height: 100vh; }

        /* ------------------ SIDEBAR ------------------ */
        .logo-img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: var(--white); box-shadow: 0 0 10px rgba(20, 184, 166, 0.2); padding: 2px; display: flex; align-items: center; justify-content: center; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; z-index: 1001; transition: transform 0.3s ease; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 18px; color: #fff; font-weight: 700;}
        .sidebar-header p { font-size: 11px; color: var(--primary); font-weight: 700; letter-spacing: 1px; margin-top: 2px;}

        .sidebar-menu { list-style: none; padding: 15px 0; flex: 1; overflow-y: auto; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .sidebar-menu li a i { font-size: 20px; }
        .sidebar-menu li.active a, .sidebar-menu li a:hover { background: rgba(255,255,255,0.05); color: #fff; border-left: 4px solid var(--primary); }
        .logout-btn { color: #ef4444 !important; }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.1) !important; border-left: 4px solid #ef4444 !important; }

        /* ------------------ MAIN CONTENT & TOPBAR ------------------ */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; width: 100%; position: relative;}
        .topbar { height: 70px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 25px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 2px rgba(0,0,0,0.02);}
        .menu-btn { display: none; background: none; border: none; font-size: 26px; cursor: pointer; color: var(--text-dark); }
        
        .user-profile { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px; border-radius: 8px;}
        .user-profile img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);}
        .user-profile div { display: flex; flex-direction: column; text-align: right;}

        .content { padding: 25px 30px; flex: 1; width: 100%; max-width: 1200px; margin: 0 auto;}
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-title { font-size: 22px; font-weight: 700; color: var(--text-dark); }

        /* FILTER CARD (Auto Filled) */
        .filter-card { background: var(--white); padding: 20px; border-radius: var(--card-curve); border: 1px solid var(--border); margin-bottom: 25px; display: flex; gap: 15px; align-items: flex-start; flex-wrap: wrap;}
        .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px;}
        .form-group label { font-size: 13px; font-weight: 600; color: var(--text-light); }
        .form-control { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; font-size: 14px; background: var(--white); width: 100%; transition: 0.2s;}
        
        /* Disabled Input Style */
        .form-control:disabled { background: #f1f5f9; color: #475569; border-color: #e2e8f0; font-weight: 600; cursor: not-allowed; }
        
        .btn-primary { background: var(--primary); color: white; border: none; padding: 11px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s;}
        .btn-primary:hover { background: var(--primary-dark); }

        /* ATTENDANCE TABLE CARD */
        .card { background: var(--white); border-radius: var(--card-curve); border: 1px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.02); overflow: hidden; display: none;}
        .card-header { padding: 18px 20px; background: #f8fafc; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center;}
        
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 600px;}
        th { padding: 12px 20px; background: #f1f5f9; font-size: 13px; text-transform: uppercase; color: var(--text-light); font-weight: 600; border-bottom: 1px solid var(--border);}
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle;}
        
        .attendance-toggle { display: flex; align-items: center; gap: 10px;}
        .radio-btn { display: none; }
        .radio-label { padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: 0.2s; background: #f1f5f9; color: var(--text-light);}
        .radio-btn:checked + .radio-label.present { background: #dcfce7; color: #16a34a; border-color: #16a34a; }
        .radio-btn:checked + .radio-label.absent { background: #fee2e2; color: #dc2626; border-color: #dc2626; }

        .btn-success { background: var(--success); color: white; border: none; padding: 14px 25px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; width: 100%; font-size: 15px;}
        .summary-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 20px; text-align: center; margin-top: 20px; display: none; }
        
        .alert-box { padding: 15px 20px; border-radius: 8px; font-weight: 600; display: none; align-items: center; gap: 10px; margin-bottom: 20px; }
        .alert-warning { background: var(--warning-light); color: #b45309; border: 1px solid #fde68a; }

        @media (max-width: 768px) { 
            .sidebar { position: fixed; left: -260px; height: 100vh; } 
            .sidebar.active { transform: translateX(260px); } 
            .menu-btn { display: block; } 
            .content { padding: 15px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="zhi_logo.png" alt="ZHI Logo" class="logo-img" onerror="this.src='https://ui-avatars.com/api/?name=ZHI&background=fff&color=14b8a6'">
                <div><h2>ZHI Faculty</h2><p>TEACHER PANEL</p></div>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="teacher_dashboard.html"><i class='bx bx-grid-alt'></i> Dashboard Home</a></li>
            <li><a href="teacher_timetable.html"><i class='bx bx-calendar'></i> My Timetable</a></li>
            <li class="active"><a href="mark_attendance.html"><i class='bx bx-user-check'></i> Mark Student Attendance</a></li>
            <li><a href="#" class="logout-btn" onclick="logoutTeacher()"><i class='bx bx-log-out'></i> Logout</a></li>
        </ul>
    </aside>

    <main class="main-wrapper">
        <header class="topbar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="menu-btn" onclick="toggleSidebar()"><i class='bx bx-menu'></i></button>
                <div style="font-size: 18px; font-weight: 600; color: var(--text-dark);">Classroom Management</div>
            </div>
            <div class="user-profile">
                <div>
                    <b id="teacherNameTxt" style="font-size: 13px; color: var(--text-dark);">Loading...</b>
                    <span style="font-size: 11px; color: var(--text-light);">Faculty Member</span>
                </div>
                <img id="teacherImg" src="https://ui-avatars.com/api/?name=Teacher&background=14b8a6&color=fff" alt="Teacher">
            </div>
        </header>

        <div class="content">
            <div class="page-header"><div class="page-title">Mark Auto-Attendance</div></div>

            <div id="noClassAlert" class="alert-box alert-warning">
                <i class='bx bx-info-circle' style="font-size: 20px;"></i>
                <span id="noClassMsgTxt">Loading your schedule...</span>
            </div>

            <div class="filter-card" id="autoFilterCard" style="display: none;">
                <div class="form-group" style="flex: 1.5;">
                    <label style="color: var(--primary);">Today's Scheduled Class</label>
                    <select id="scheduleSelect" class="form-control" onchange="onClassSelectChange()" style="border-color: var(--primary); font-weight: 600;"></select>
                </div>
                
                <div class="form-group">
                    <label>Course & Batch</label>
                    <input type="text" id="courseBatchTxt" class="form-control" disabled>
                </div>
                
                <div class="form-group" style="max-width: 100px;">
                    <label>Semester</label>
                    <input type="text" id="semTxt" class="form-control" disabled>
                </div>
                
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subjectTxt" class="form-control" disabled>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="attDate" class="form-control" disabled>
                </div>

                <div class="form-group" style="min-width: 140px;">
                    <button type="button" class="btn-primary" onclick="loadStudentsForAttendance()" id="fetchBtn" style="height: 42px; margin-top: 22px;">
                        <i class='bx bx-list-ul'></i> Fetch Students
                    </button>
                </div>
            </div>

            <div class="card" id="attendanceCard">
                <div class="card-header">
                    <span id="tableTitle"><i class='bx bx-edit'></i> Student List</span>
                    <div>
                        <button type="button" onclick="markAll('Present')" style="background: #dcfce7; color: #16a34a; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; margin-right: 5px;">Mark All Present</button>
                        <button type="button" onclick="markAll('Absent')" style="background: #fee2e2; color: #dc2626; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;">Mark All Absent</button>
                    </div>
                </div>
                <form onsubmit="submitAttendance(event)">
                    <div style="overflow-x: auto;">
                        <table id="attendanceTable">
                            <thead>
                                <tr>
                                    <th style="width: 80px;">S.No</th>
                                    <th>Roll No</th>
                                    <th>Student Name</th>
                                    <th>Attendance Status</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody"></tbody>
                        </table>
                    </div>
                    <div style="padding: 20px; border-top: 1px solid var(--border); background: #f8fafc;">
                        <button type="submit" class="btn-success" id="submitBtn"><i class='bx bx-cloud-upload'></i> Secure Save Attendance</button>
                    </div>
                </form>
            </div>

            <div class="summary-box" id="summaryBox">
                <h3 id="summaryTitle"><i class='bx bx-check-circle'></i> Attendance Saved Successfully!</h3>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://zhi-college-rtya.onrender.com/api";
        let staffId = null;
        let staffName = "Faculty";
        
        let todaysRoutines = [];
        let activeRoutine = null;
        let isEditModeActive = false;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function logoutTeacher() { sessionStorage.clear(); localStorage.clear(); window.location.href = "index.html"; }

        // Time to 12-hour format converter
        function formatToAMPM(timeStr) {
            if(!timeStr) return "";
            let [hours, minutes] = timeStr.split(':');
            let h = parseInt(hours, 10);
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; 
            return `${h < 10 ? '0'+h : h}:${minutes} ${ampm}`;
        }
        
        // Time to Minutes for exact auto-selection
        function timeToMinutes(timeStr) {
            let [h, m] = timeStr.split(':').map(Number);
            return (h * 60) + m;
        }

        window.onload = async function() {
            if (typeof currentUser !== 'undefined' && currentUser) {
                staffId = currentUser.staffId || currentUser._id;
                staffName = currentUser.name || "Faculty";
                document.getElementById("teacherNameTxt").innerText = staffName;
            }

            if (!staffId) { alert("Please login first!"); window.location.href = "index.html"; return; }
            
            // Aaj ki date set kardi, Disabled form me
            document.getElementById('attDate').valueAsDate = new Date();
            
            await fetchAndAutoSetRoutine();
        }

        // ============================================================
        // 🚀 DATABASE SE FETCH KARKE AUTO SELECT KARNE WALA MAGIC
        // ============================================================
        async function fetchAndAutoSetRoutine() {
            try {
                const response = await fetch(`${API_BASE_URL}/routines?teacherId=${staffId}`);
                const result = await response.json();
                
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                const todayName = days[new Date().getDay()]; // e.g. "Monday"

                // Sirf aaj ke din ki classes filter karo
                todaysRoutines = (result.data || []).filter(r => r.dayOfWeek === todayName);

                const alertBox = document.getElementById('noClassAlert');
                const filterCard = document.getElementById('autoFilterCard');

                if (todaysRoutines.length === 0) {
                    alertBox.style.display = "flex";
                    document.getElementById('noClassMsgTxt').innerText = `As per HOD Routine, you have NO classes scheduled for today (${todayName}).`;
                    filterCard.style.display = "none";
                    return;
                }

                // Agar classes hain, toh unhe Dropdown me daalo
                const scheduleSelect = document.getElementById('scheduleSelect');
                scheduleSelect.innerHTML = "";
                
                const now = new Date();
                const currentMinutes = (now.getHours() * 60) + now.getMinutes();
                let selectedIndex = 0; // Default first class

                todaysRoutines.forEach((r, index) => {
                    let timeLabel = `${formatToAMPM(r.startTime)} - ${formatToAMPM(r.endTime)}`;
                    let opt = document.createElement("option");
                    opt.value = index;
                    opt.text = `${timeLabel} | ${r.course} (${r.subject})`;
                    scheduleSelect.appendChild(opt);

                    // SMART LOGIC: Agar current time is class ke beech me hai, toh isko Auto-Select karo
                    let startMins = timeToMinutes(r.startTime);
                    let endMins = timeToMinutes(r.endTime);
                    if (currentMinutes >= startMins && currentMinutes <= endMins) {
                        selectedIndex = index;
                    }
                });

                scheduleSelect.selectedIndex = selectedIndex;
                alertBox.style.display = "none";
                filterCard.style.display = "flex";

                // UI Disable Labels update kardo
                onClassSelectChange();

            } catch (e) {
                console.error("Routine fetch failed:", e);
                document.getElementById('noClassMsgTxt').innerText = "Server error while fetching timetable!";
            }
        }

        // Jab class change ho (ya auto select ho), baaki input boxes disable rahenge aur data set ho jayega
        function onClassSelectChange() {
            const index = document.getElementById('scheduleSelect').value;
            activeRoutine = todaysRoutines[index];

            document.getElementById('courseBatchTxt').value = `${activeRoutine.course} (Batch: ${activeRoutine.sessionBatch})`;
            document.getElementById('semTxt').value = `Sem ${activeRoutine.semester}`;
            document.getElementById('subjectTxt').value = activeRoutine.subject;
            
            // Clear old tables
            document.getElementById('attendanceCard').style.display = 'none';
            document.getElementById('summaryBox').style.display = 'none';
        }

        // ============================================================
        // 📝 GET STUDENTS LIST
        // ============================================================
        async function loadStudentsForAttendance() {
            if(!activeRoutine) return;

            const btn = document.getElementById('fetchBtn');
            btn.innerHTML = "<i class='bx bx-loader bx-spin'></i> Loading...";

            // Values database routine se hi lenge
            const course = activeRoutine.course;
            const batch = activeRoutine.sessionBatch;
            const sem = activeRoutine.semester;
            const subject = activeRoutine.subject;
            const date = document.getElementById('attDate').value;
            const timeSlotFormatted = `${formatToAMPM(activeRoutine.startTime)} - ${formatToAMPM(activeRoutine.endTime)}`;

            try {
                // Check if attendance already exists
                const checkRes = await fetch(`${API_BASE_URL}/attendance/check?course=${course}&sessionBatch=${batch}&semester=${sem}&subject=${subject}&date=${date}&timeSlot=${timeSlotFormatted}`);
                const checkResult = await checkRes.json();
                
                let existingData = null;
                isEditModeActive = false;

                if(checkResult.exists) {
                    if(confirm("Attendance for this class is already taken! Do you want to edit it?")) {
                        existingData = checkResult.data.attendanceList;
                        isEditModeActive = true;
                    } else {
                        btn.innerHTML = "<i class='bx bx-list-ul'></i> Fetch Students";
                        return;
                    }
                }

                // Fetch students
                const studentRes = await fetch(`${API_BASE_URL}/get-students?course=${course}&sessionBatch=${batch}&semester=${sem}`);
                const studentResult = await studentRes.json();

                const tbody = document.getElementById('studentTableBody');
                tbody.innerHTML = "";

                if(studentResult.success && studentResult.students.length > 0) {
                    document.getElementById('tableTitle').innerHTML = `<i class='bx bx-check-shield'></i> Class: ${course} | Time: ${timeSlotFormatted}`;
                    
                    studentResult.students.forEach((student, index) => {
                        let isPresent = true; 
                        if(existingData) {
                            const found = existingData.find(a => a.studentId === student._id);
                            if(found && found.status === 'Absent') isPresent = false;
                        }

                        let tr = document.createElement('tr');
                        tr.dataset.studentid = student._id;
                        tr.innerHTML = `
                            <td>${index + 1}</td>
                            <td><b>${student.roll}</b></td>
                            <td>${student.name}</td>
                            <td>
                                <div class="attendance-toggle">
                                    <input type="radio" name="att_${student._id}" id="p_${student._id}" value="Present" class="radio-btn" ${isPresent ? 'checked' : ''}>
                                    <label for="p_${student._id}" class="radio-label present">Present</label>
                                    
                                    <input type="radio" name="att_${student._id}" id="a_${student._id}" value="Absent" class="radio-btn" ${!isPresent ? 'checked' : ''}>
                                    <label for="a_${student._id}" class="radio-label absent">Absent</label>
                                </div>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });

                    document.getElementById('attendanceCard').style.display = 'block';
                } else {
                    alert("No students found in this Course & Semester.");
                }

            } catch (error) {
                alert("Database connect error!");
            } finally {
                btn.innerHTML = "<i class='bx bx-list-ul'></i> Fetch Students";
            }
        }

        function markAll(status) {
            const rows = document.querySelectorAll('#studentTableBody tr');
            rows.forEach(row => {
                const sid = row.dataset.studentid;
                document.getElementById(status === 'Present' ? `p_${sid}` : `a_${sid}`).checked = true;
            });
        }

        // ============================================================
        // 🔒 SUBMIT ATTENDANCE TO DATABASE
        // ============================================================
        async function submitAttendance(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = "<i class='bx bx-loader bx-spin'></i> Saving to Database...";
            btn.disabled = true;

            const attData = [];
            const rows = document.querySelectorAll('#studentTableBody tr');
            rows.forEach(row => {
                const sid = row.dataset.studentid;
                attData.push({
                    studentId: sid,
                    rollNo: row.children[1].innerText,
                    studentName: row.children[2].innerText,
                    status: document.getElementById(`p_${sid}`).checked ? "Present" : "Absent"
                });
            });

            // Yahan bhi values activeRoutine se hi jayengi taaki hack na ho
            const finalPayload = {
                teacherId: staffId,
                course: activeRoutine.course,
                sessionBatch: activeRoutine.sessionBatch,
                semester: activeRoutine.semester,
                subject: activeRoutine.subject,
                date: document.getElementById('attDate').value,
                timeSlot: `${formatToAMPM(activeRoutine.startTime)} - ${formatToAMPM(activeRoutine.endTime)}`,
                attendanceList: attData
            };

            try {
                const response = await fetch(`${API_BASE_URL}/attendance/mark`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(finalPayload)
                });
                const result = await response.json();

                if(result.success) {
                    document.getElementById('attendanceCard').style.display = 'none';
                    document.getElementById('summaryTitle').innerHTML = isEditModeActive ? "Attendance Updated!" : "Attendance Saved Database Me!";
                    document.getElementById('summaryBox').style.display = 'block';
                } else {
                    alert("Error: " + result.message);
                }
            } catch(error) {
                alert("Failed to submit to server.");
            } finally {
                btn.innerHTML = "<i class='bx bx-cloud-upload'></i> Secure Save Attendance";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
