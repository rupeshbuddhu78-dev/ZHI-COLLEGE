<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHI | Student Admission</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Update kiya gaya hai bina nav bar ke full-screen clean look ke liye */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f1f5f9; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: #1e293b; font-size: 13px; }

        /* Topbar Styling (ZHI Heading) */
        .topbar { height: 70px; background: #0c0a25; border-bottom: 1px solid #2e2a6b; display: flex; justify-content: center; align-items: center; padding: 0 25px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .topbar h1 { font-size: 22px; color: #ffffff; font-weight: 700; letter-spacing: 0.5px; }

        /* Main Content Wrapper */
        .main-wrapper { flex: 1; display: flex; justify-content: center; overflow-y: auto; padding: 30px 15px; }
        .content { width: 100%; max-width: 1000px; }

        /* Form Card Styling */
        .form-card { background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); overflow: hidden; margin-bottom: 40px; }
        .form-header { padding: 20px 25px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .form-header h3 { font-size: 18px; color: #1e1b4b; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        
        /* Grid System */
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-weight: 600; color: #475569; font-size: 12px; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; font-size: 13px;
            background: #f8fafc; transition: 0.2s; width: 100%;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { 
            border-color: #4f46e5; background: #fff; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); 
        }
        
        .readonly-input { background-color: #e2e8f0 !important; color: #334155; cursor: not-allowed; font-weight: 600; }

        .full-width { grid-column: 1 / -1; }
        .span-2 { grid-column: span 2; }
        
        .form-section-title { 
            grid-column: 1 / -1; margin-top: 15px; padding-bottom: 8px; border-bottom: 2px solid #e2e8f0; 
            color: #1e1b4b; font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; 
        }

        /* Footer & Buttons */
        .form-footer { padding: 20px 25px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 12px; background: #f8fafc; }
        .btn-secondary { background: #e2e8f0; color: #475569; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s;}
        .btn-secondary:hover { background: #cbd5e1; }
        .btn-success { background: #4f46e5; color: white; border: none; padding: 10px 24px; border-radius: 6px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-success:hover { background: #4338ca; }
        .btn-success:disabled { background: #818cf8; cursor: not-allowed; }

        /* Responsiveness */
        @media screen and (max-width: 992px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }
        @media screen and (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .span-2 { grid-column: span 1; }
            .main-wrapper { padding: 15px; }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <h1>ZHI | Student Admission Portal</h1>
    </header>

    <div class="main-wrapper">
        <main class="content">
            
            <div class="form-card">
                <div class="form-header">
                    <h3>📝 New Student Registration Form</h3>
                </div>
                
                <form id="studentForm">
                    <div class="form-grid">
                        
                        <div class="form-section-title">🎓 Academic & Registration Details</div>
                        <div class="form-group">
                            <label>Faculty / Course *</label>
                            <select name="course" required>
                                <option value="">Select Course</option>
                                <option value="BCA">BCA</option>
                                <option value="MCA">MCA</option>
                                <option value="BBA">BBA</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Semester *</label>
                            <select name="semester" required>
                                <option value="">Select Semester</option>
                                <option value="1">1st Sem</option>
                                <option value="2">2nd Sem</option>
                                <option value="3">3rd Sem</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Session / Batch *</label>
                            <input type="text" name="sessionBatch" placeholder="e.g. 2024-2027" required>
                        </div>
                        <div class="form-group">
                            <label>Registration Date *</label>
                            <input type="date" name="registrationDate" required>
                        </div>
                        <div class="form-group">
                            <label>College Registration No.</label>
                            <input type="text" name="collegeRegNo" placeholder="e.g. PATAKUBCA-JUL25280008">
                        </div>
                        <div class="form-group">
                            <label>University Reg. No. (If available)</label>
                            <input type="text" name="univRegNo" placeholder="Enter Univ. Reg. No.">
                        </div>

                        <div class="form-section-title">👤 Personal Information</div>
                        <div class="form-group span-2">
                            <label>Student Full Name *</label>
                            <input type="text" name="studentName" placeholder="Enter full name" required>
                        </div>
                        <div class="form-group">
                            <label>Date of Birth *</label>
                            <input type="date" name="dob" required>
                        </div>
                        <div class="form-group">
                            <label>Gender *</label>
                            <select name="gender" required>
                                <option value="MALE">Male</option>
                                <option value="FEMALE">Female</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Blood Group</label>
                            <select name="bloodGroup">
                                <option value="">Select</option>
                                <option value="O+">O+</option>
                                <option value="A+">A+</option>
                                <option value="B+">B+</option>
                                <option value="AB+">AB+</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nationality</label>
                            <input type="text" name="nationality" value="Indian">
                        </div>
                        <div class="form-group">
                            <label>Mother Tongue</label>
                            <input type="text" name="motherTongue" placeholder="e.g. HINDI">
                        </div>
                        <div class="form-group">
                            <label>Student Mobile No. *</label>
                            <input type="tel" name="studentMobile" id="studentMobile" placeholder="Enter mobile number" required oninput="updateCredentials()">
                        </div>
                        <div class="form-group">
                            <label>E-mail Address *</label>
                            <input type="email" name="email" id="studentEmail" placeholder="student@example.com" required oninput="updateCredentials()">
                        </div>
                        <div class="form-group">
                            <label>Aadhar Number *</label>
                            <input type="text" name="aadharNumber" placeholder="12-digit Aadhar No." required>
                        </div>
                        <div class="form-group">
                            <label>Category *</label>
                            <select name="category" required>
                                <option value="">Select Category</option>
                                <option value="GEN">General</option>
                                <option value="OBC">OBC</option>
                                <option value="SC">SC</option>
                                <option value="ST">ST</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Religion</label>
                            <select name="religion">
                                <option value="">Select Religion</option>
                                <option value="HINDU">Hindu</option>
                                <option value="MUSLIM">Muslim</option>
                            </select>
                        </div>

                        <div class="form-section-title">📍 Address Details</div>
                        <div class="form-group span-2">
                            <label>Permanent Address *</label>
                            <input type="text" name="permanentAddress" placeholder="House No, Street, Village/Area" required>
                        </div>
                        <div class="form-group">
                            <label>City *</label>
                            <input type="text" name="city" placeholder="e.g. Samastipur" required>
                        </div>
                        <div class="form-group">
                            <label>State *</label>
                            <select name="state" required>
                                <option value="Bihar">Bihar</option>
                                <option value="Jharkhand">Jharkhand</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Pincode *</label>
                            <input type="text" name="pincode" placeholder="e.g. 848101" required>
                        </div>
                        <div class="form-group">
                            <label>District *</label>
                            <input type="text" name="district" placeholder="e.g. Samastipur" required>
                        </div>
                        <div class="form-group full-width">
                            <label>Temporary / Current Address</label>
                            <input type="text" name="tempAddress" placeholder="Leave blank if same as permanent">
                        </div>

                        <div class="form-section-title">👨‍👩‍👦 Parental & Guardian Info</div>
                        <div class="form-group span-2">
                            <label>Father's Name *</label>
                            <input type="text" name="fatherName" required placeholder="Enter Father's Name">
                        </div>
                        <div class="form-group">
                            <label>Father's Mobile No. *</label>
                            <input type="tel" name="fatherMobile" required placeholder="Father's Contact">
                        </div>
                        <div class="form-group span-2">
                            <label>Mother's Name *</label>
                            <input type="text" name="motherName" required placeholder="Enter Mother's Name">
                        </div>
                        <div class="form-group">
                            <label>Mother's Mobile No.</label>
                            <input type="tel" name="motherMobile" placeholder="Mother's Contact">
                        </div>
                        <div class="form-group">
                            <label>Guardian Name</label>
                            <input type="text" name="guardianName" placeholder="Enter Guardian Name">
                        </div>
                        <div class="form-group">
                            <label>Relation with Guardian</label>
                            <input type="text" name="guardianRelation" placeholder="e.g. FATHER / UNCLE">
                        </div>
                        <div class="form-group">
                            <label>Guardian Mobile No.</label>
                            <input type="tel" name="guardianMobile" placeholder="Guardian Contact">
                        </div>
                        <div class="form-group full-width">
                            <label>Guardian Address</label>
                            <input type="text" name="guardianAddress" placeholder="Enter Guardian Address">
                        </div>

                        <div class="form-section-title">📂 Document Uploads</div>
                        <div class="form-group">
                            <label>Student Photo</label>
                            <input type="file" name="profileImage" id="profileImage" accept="image/*">
                        </div>
                        <div class="form-group">
                            <label>Aadhar Card</label>
                            <input type="file" accept=".pdf, .jpg, .png">
                        </div>
                        <div class="form-group">
                            <label>Previous Marksheets (10th/12th/Grad)</label>
                            <input type="file" multiple accept=".pdf, .jpg, .png">
                        </div>

                        <div class="form-section-title">💰 Admission Fees Setup</div>
                        <div class="form-group">
                            <label>Amount Collected (₹)</label>
                            <input type="number" name="amountCollected" placeholder="e.g. 5000">
                        </div>
                        <div class="form-group">
                            <label>Payment Mode</label>
                            <select name="paymentMode">
                                <option>Cash</option>
                                <option>UPI / Online</option>
                                <option>Cheque / DD</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Transaction ID / Remarks</label>
                            <input type="text" name="transactionId" placeholder="If paid via UPI/Bank">
                        </div>
                        
                        <div class="form-section-title">🔐 Student App Login Credentials</div>
                        <div class="form-group span-2">
                            <label>Login ID (Auto-fetched from Email)</label>
                            <input type="text" id="generatedEmail" class="readonly-input" readonly placeholder="Will appear as you type email...">
                        </div>
                        <div class="form-group">
                            <label>Password (Auto-generated from Mobile)</label>
                            <input type="text" id="generatedPassword" class="readonly-input" readonly placeholder="Will appear as you type mobile...">
                            <small style="color: #64748b; font-size: 11px; margin-top: 2px;">* Will be saved in DB automatically</small>
                        </div>

                    </div>

                    <div class="form-footer">
                        <button type="reset" class="btn-secondary" onclick="clearCredentials()">Clear Form</button>
                        <button type="submit" class="btn-success">✅ Register Student</button>
                    </div>
                </form>
            </div>
            
        </main>
    </div>

    <script>
        // Tumhara baaki ka saara JS logic same hai (Sirf toggleSidebar hataya gaya hai)
        
        function updateCredentials() {
            const email = document.getElementById('studentEmail').value;
            const mobile = document.getElementById('studentMobile').value;
            
            document.getElementById('generatedEmail').value = email;
            document.getElementById('generatedPassword').value = mobile;
        }

        function clearCredentials() {
            document.getElementById('generatedEmail').value = '';
            document.getElementById('generatedPassword').value = '';
        }

        // ----------------------------------------------------
        // ASLI SERVER CONNECTION LOGIC (2 Step Process)
        // ----------------------------------------------------
        document.getElementById('studentForm').onsubmit = async function(e) {
            e.preventDefault(); 
            
            const submitBtn = document.querySelector('.btn-success');
            submitBtn.innerText = "⏳ Saving...";
            submitBtn.disabled = true;

            const formData = new FormData(this);
            const studentData = Object.fromEntries(formData.entries());

            try {
                // STEP 1: Pehle Student ka text data bhejo
                const response = await fetch('/api/add-student', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData) 
                });

                const result = await response.json();

                if (response.ok) {
                    const studentId = result.studentId; // DB se student ki ID mil gayi
                    
                    // STEP 2: Agar Admin ne photo select ki hai, toh photo upload karo
                    const photoInput = document.getElementById('profileImage');
                    if (photoInput.files.length > 0) {
                        submitBtn.innerText = "⏳ Uploading Photo...";
                        const photoData = new FormData();
                        photoData.append('profileImage', photoInput.files[0]);

                        const photoResponse = await fetch(`/api/upload-photo/${studentId}`, {
                            method: 'POST',
                            body: photoData // FormData bhej rahe hain file upload ke liye
                        });

                        const photoResult = await photoResponse.json();
                        if (!photoResponse.ok) {
                            alert("⚠️ Student register ho gaya, par photo upload nahi ho paayi: " + photoResult.message);
                        }
                    }

                    // Success Alert
                    const savedEmail = document.getElementById('generatedEmail').value;
                    const savedPassword = document.getElementById('generatedPassword').value;
                    
                    alert(`✅ Student Admitted Successfully!\n\n📱 App Login Details:\nLogin ID: ${savedEmail}\nPassword: ${savedPassword}`);
                    
                    this.reset();
                    clearCredentials();
                } else {
                    alert(`❌ Error: ${result.message}`);
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                alert("❌ Server connect nahi ho pa raha hai!");
            } finally {
                submitBtn.innerText = "✅ Register Student";
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
